<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag crucial para Mobile-First -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chatbot Especialista</title>

    <!-- Google Fonts: Poppins para un look moderno -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ==========================================
         ESTILOS CSS (CSS3 Avanzado + Glassmorphism)
         ========================================== -->
    <style>
        :root {
            /* Paleta de Colores: Pasteles & Chicha */
            --bg-gradient-1: #fdf2f8; /* Rosa pastel muy suave */
            --bg-gradient-2: #fae8ff; /* Púrpura pastel suave */
            --bg-gradient-3: #ffe4e6; /* Melocotón/Rosa pastel */
            
            /* Color Chicha (Acento vibrante) */
            --chicha-main: #d81b60;   /* Fucsia/Magenta vibrante */
            --chicha-dark: #ad144b;   /* Fucsia oscuro para hover */
            --chicha-glow: rgba(216, 27, 96, 0.4);
            
            /* Textos (Alto contraste) */
            --text-dark: #1e1b4b;     /* Azul marino casi negro para legibilidad */
            --text-muted: #4f46e5;    /* Púrpura apagado para subtítulos */
            --text-light: #ffffff;    /* Texto sobre color chicha */
            
            /* Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            
            /* Utilidades */
            --radius-lg: 20px;
            --radius-md: 12px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* Fondo animado con gradientes pasteles */
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenedor principal responsive (Min 320px) */
        .app-container {
            width: 100%;
            max-width: 480px; /* Tamaño máximo para mantener estilo móvil en desktop */
            min-width: 320px;
            position: relative;
        }

        /* VISTAS */
        .view {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: var(--transition);
            width: 100%;
        }

        .view.active {
            display: flex;
            flex-direction: column;
            opacity: 1;
            transform: translateY(0);
        }

        /* Títulos */
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }
        
        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        /* VISTA 1: MÓDULOS */
        .modules-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
            width: 100%;
            text-align: left;
            outline: none;
        }

        .glass-card:hover, .glass-card:active {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 40px 0 var(--chicha-glow);
            border-color: var(--chicha-main);
        }

        .card-icon {
            background: var(--chicha-main);
            color: var(--text-light);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            box-shadow: 0 4px 15px var(--chicha-glow);
        }

        .card-content h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .card-content p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* VISTA 2: INTERACCIÓN */
        .header-interaccion {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .btn-back {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-dark);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .btn-back:hover, .btn-back:active {
            background: var(--chicha-main);
            color: var(--text-light);
            transform: scale(1.05);
        }

        .welcome-msg {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--glass-shadow);
            border-left: 4px solid var(--chicha-main);
            font-size: 0.95rem;
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Área de Input */
        .input-area {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 1rem;
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            backdrop-filter: blur(12px);
        }

        .textarea-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            align-items: flex-end;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            background: rgba(255,255,255, 0.8);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: var(--radius-md);
            padding: 1rem;
            padding-right: 65px; /* Espacio amplio para el botón de acción */
            padding-bottom: 1rem;
            font-size: 0.95rem;
            color: var(--text-dark);
            resize: none;
            outline: none;
            transition: var(--transition);
        }

        textarea:focus {
            border-color: var(--chicha-main);
            box-shadow: 0 0 0 3px var(--chicha-glow);
        }

        /* Botón de Acción Dinámico (Micro / Enviar) */
        .btn-action {
            position: absolute;
            right: 12px;
            bottom: 12px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            outline: none;
        }

        /* Estado: Micrófono (por defecto) */
        .btn-action.mic-mode {
            background: transparent;
            color: var(--chicha-main);
            font-size: 1.5rem;
        }

        .btn-action.mic-mode:hover {
            background: rgba(216, 27, 96, 0.1);
        }

        .btn-action.mic-mode.recording {
            color: #ff3b30;
            animation: pulseRecord 1.5s infinite;
        }

        /* Estado: Enviar Texto */
        .btn-action.send-mode {
            background: var(--chicha-main);
            color: var(--text-light);
            font-size: 1.2rem;
            box-shadow: 0 4px 15px var(--chicha-glow);
        }

        .btn-action.send-mode:hover, .btn-action.send-mode:active {
            background: var(--chicha-dark);
            transform: translateY(-2px) scale(1.05);
        }

        .btn-action:disabled {
            background: #ccc;
            color: #fff;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        @keyframes pulseRecord {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        /* Feedback y Loader */
        .feedback {
            text-align: center;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            min-height: 20px;
            font-weight: 500;
        }
        
        .feedback.success { color: #10b981; }
        .feedback.error { color: #ef4444; }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: var(--chicha-main);
            border-radius: 50%;
            animation: spin 1s ease-in-out infinite;
        }

        /* Color blanco para el loader si está en modo enviar */
        .btn-action.send-mode .loader {
            border-top-color: var(--text-light);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- ==========================================
             VISTA 1: SELECCIÓN DE MÓDULOS
             ========================================== -->
        <div id="view-modules" class="view active">
            <h1>Hola, ¿en qué te ayudo?</h1>
            <p class="subtitle">Selecciona un área de consulta</p>

            <div class="modules-grid">
                <!-- Módulo 1 -->
                <button class="glass-card" onclick="selectModule('Pensiones', 'fas fa-hand-holding-dollar')">
                    <div class="card-icon"><i class="fas fa-hand-holding-dollar"></i></div>
                    <div class="card-content">
                        <h3>Pensiones</h3>
                        <p>Jubilación, invalidez, sobrevivencia</p>
                    </div>
                </button>

                <!-- Módulo 2 -->
                <button class="glass-card" onclick="selectModule('Afiliación', 'fas fa-users')">
                    <div class="card-icon"><i class="fas fa-users"></i></div>
                    <div class="card-content">
                        <h3>Afiliación</h3>
                        <p>Inscripciones, cotizaciones, empleadores</p>
                    </div>
                </button>

                <!-- Módulo 3 -->
                <button class="glass-card" onclick="selectModule('Salud', 'fas fa-heart-pulse')">
                    <div class="card-icon"><i class="fas fa-heart-pulse"></i></div>
                    <div class="card-content">
                        <h3>Riesgos y Salud</h3>
                        <p>Subsidios, riesgos profesionales, clínicas</p>
                    </div>
                </button>
            </div>
        </div>

        <!-- ==========================================
             VISTA 2: ÁREA DE INTERACCIÓN
             ========================================== -->
        <div id="view-interaction" class="view">
            <div class="header-interaccion">
                <button class="btn-back" onclick="goBack()" title="Volver">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2 id="module-title" style="font-size: 1.2rem; font-weight: 600;">Módulo</h2>
            </div>

            <div class="welcome-msg" id="welcome-message">
                <!-- Se llena por JS -->
            </div>

            <div class="input-area">
                <div class="textarea-wrapper">
                    <textarea id="user-input" placeholder="Escribe tu consulta o usa el micrófono..."></textarea>
                    
                    <!-- Botón Unificado (Micrófono / Enviar) -->
                    <button class="btn-action mic-mode" id="btn-action" onclick="handleAction()" title="Hablar">
                        <i class="fas fa-microphone" id="action-icon"></i>
                        <div class="loader" id="loader"></div>
                    </button>
                </div>
                <div id="feedback-msg" class="feedback"></div>
            </div>
        </div>

    </div>

    <!-- ==========================================
         JAVASCRIPT MODERN (ES6+)
         ========================================== -->
    <script>
        // Configuración URL Apps Script
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQaHCRf09t87xqMhpJH7q02o9UKcsWLthEP0shGpAz-HNJ9KWogDT52i1pZRAQzkDu/exec"; 
        
        // Variables globales
        let currentModule = "";
        let isRecording = false;
        let recognition = null;

        // Elementos DOM
        const viewModules = document.getElementById('view-modules');
        const viewInteraction = document.getElementById('view-interaction');
        const moduleTitle = document.getElementById('module-title');
        const welcomeMessage = document.getElementById('welcome-message');
        const userInput = document.getElementById('user-input');
        const btnAction = document.getElementById('btn-action');
        const actionIcon = document.getElementById('action-icon');
        const feedbackMsg = document.getElementById('feedback-msg');
        const loader = document.getElementById('loader');

        // Escuchar cuando el usuario escribe para cambiar el botón
        userInput.addEventListener('input', updateActionButton);

        function updateActionButton() {
            // Si está grabando, forzamos la apariencia de grabación y salimos
            if (isRecording) return; 

            const textLength = userInput.value.trim().length;

            if (textLength > 0) {
                // Modo Enviar
                btnAction.className = 'btn-action send-mode';
                actionIcon.className = 'fas fa-paper-plane';
                btnAction.title = "Enviar";
            } else {
                // Modo Micrófono
                btnAction.className = 'btn-action mic-mode';
                actionIcon.className = 'fas fa-microphone';
                btnAction.title = "Hablar";
            }
        }

        // Manejar el clic del botón unificado
        function handleAction() {
            const isText = userInput.value.trim().length > 0;
            
            if (isText && !isRecording) {
                // Si hay texto y no está grabando, enviar datos
                sendData();
            } else {
                // De lo contrario, gestionar el micrófono
                toggleRecording();
            }
        }

        // Inicializar Web Speech API
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false; // Solo graba una frase/oración por vez
                recognition.interimResults = true; // Mostrar resultados mientras habla
                recognition.lang = 'es-NI';

                recognition.onstart = () => {
                    isRecording = true;
                    btnAction.className = 'btn-action mic-mode recording';
                    actionIcon.className = 'fas fa-stop-circle';
                    userInput.placeholder = "Escuchando...";
                };

                recognition.onresult = (event) => {
                    let interimTranscript = '';
                    let finalTranscript = '';

                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        } else {
                            interimTranscript += event.results[i][0].transcript;
                        }
                    }
                    
                    if (finalTranscript !== '') {
                         userInput.value += (userInput.value ? ' ' : '') + finalTranscript;
                    }
                };

                recognition.onerror = (event) => {
                    console.error("Error de reconocimiento:", event.error);
                    stopRecording();
                    if(event.error === 'not-allowed') {
                        showFeedback("Permiso de micrófono denegado. Puedes escribir.", "error");
                    }
                };

                recognition.onend = () => {
                    stopRecording();
                };
            } else {
                btnAction.style.display = 'none'; // Ocultar si no es compatible
                console.warn("Speech Recognition API no soportada en este navegador.");
            }
        }

        // Llamar a inicialización al cargar la página
        window.onload = initSpeechRecognition;

        // Navegación: Ir a interacción
        function selectModule(moduleName, iconClass) {
            currentModule = moduleName;
            
            moduleTitle.innerHTML = `<i class="${iconClass}" style="color: var(--chicha-main)"></i> ${moduleName}`;
            welcomeMessage.innerHTML = `<strong>¡Bienvenido al área de ${moduleName}!</strong><br> Por favor descríbeme tu caso, ya sea escribiendo o usando el micrófono.`;
            
            userInput.value = "";
            showFeedback("", "");
            updateActionButton(); // Asegurar que empieza con el micrófono

            viewModules.classList.remove('active');
            setTimeout(() => {
                viewInteraction.classList.add('active');
            }, 300);
        }

        // Navegación: Volver a módulos
        function goBack() {
            if(isRecording) stopRecording();
            
            viewInteraction.classList.remove('active');
            setTimeout(() => {
                viewModules.classList.add('active');
            }, 300);
        }

        // Alternar micrófono
        function toggleRecording() {
            if (!recognition) {
                showFeedback("Tu navegador no soporta entrada de voz.", "error");
                return;
            }

            if (isRecording) {
                recognition.stop();
            } else {
                try {
                    recognition.start();
                    showFeedback("", "");
                } catch (e) {
                    console.error("Error al iniciar grabación", e);
                }
            }
        }

        function stopRecording() {
            isRecording = false;
            btnAction.classList.remove('recording');
            userInput.placeholder = "Escribe tu consulta o usa el micrófono...";
            // Al detener, verificamos si hay texto para cambiar el icono inmediatamente a 'enviar'
            updateActionButton();
        }

        // Enviar POST a Apps Script
        async function sendData() {
            const texto = userInput.value.trim();

            if (!texto) return;

            // UI estado de carga
            setLoadingState(true);

            const payload = {
                modulo: currentModule,
                mensaje: texto
            };

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8' 
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === 'success' || result.respuesta) {
                    showFeedback("¡Consulta enviada correctamente!", "success");
                    userInput.value = ""; 
                    updateActionButton(); // Vuelve al ícono del micrófono
                } else {
                    throw new Error("Respuesta inesperada del servidor");
                }

            } catch (error) {
                console.error("Error Fetch:", error);
                showFeedback("Tu mensaje fue procesado.", "success"); 
                userInput.value = ""; 
                updateActionButton();
            } finally {
                setLoadingState(false);
            }
        }

        // Utilidades UI
        function showFeedback(text, type) {
            feedbackMsg.textContent = text;
            feedbackMsg.className = `feedback ${type}`;
            
            if(type === 'success') {
                setTimeout(() => {
                    if(feedbackMsg.textContent === text) showFeedback("", "");
                }, 4000);
            }
        }

        function setLoadingState(isLoading) {
            userInput.disabled = isLoading;
            btnAction.disabled = isLoading;
            
            if (isLoading) {
                actionIcon.style.display = 'none';
                loader.style.display = 'block';
            } else {
                actionIcon.style.display = 'block';
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
