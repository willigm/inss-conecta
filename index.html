<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSS Conecta - IA</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #130c1a; color: white; font-family: sans-serif; }
        .btn-chicha { background-color: #ec4899; color: white; transition: all 0.3s; }
        .btn-chicha:hover { background-color: #db2777; transform: scale(1.05); }
        .welcome-card { background: rgba(31, 41, 55, 0.5); border: 1px solid #374151; border-radius: 1rem; padding: 1.5rem; cursor: pointer; text-align: center; position: relative; }
        .welcome-card:hover { border-color: #ec4899; }
        .card-icon-big { font-size: 2.5rem; color: #ec4899; margin-bottom: 1rem; }
        .card-badge { position: absolute; top: 1rem; right: 1rem; background: #ec4899; font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 9999px; }
        .nav-btn { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; border-radius: 0.5rem; width: 100%; text-align: left; }
        .nav-btn:hover { background: rgba(255,255,255,0.05); }
        .nav-btn.active { background: rgba(236, 72, 153, 0.1); border-left: 4px solid #ec4899; }
        .icon-box { background: rgba(31,41,55,0.8); padding: 0.5rem; border-radius: 0.5rem; color: #ec4899; }
        .message { margin-bottom: 1rem; padding: 1rem; border-radius: 1rem; max-width: 85%; }
        .message.ai { background-color: #1f2937; border-bottom-left-radius: 0; }
        .message.user { background-color: #ec4899; border-bottom-right-radius: 0; margin-left: auto; }
        .message.error { background-color: rgba(220, 38, 38, 0.2); color: #fca5a5; border: 1px solid #dc2626; text-align: center; }
        .recording { background-color: #ef4444 !important; animation: pulse 1s infinite alternate; }
        .busy { animation: blink 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
        /* Sidebar transitions */
        #sidebar { transition: transform 0.3s ease; }
        #sidebar.open { transform: translateX(0); }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-72 bg-[#0d0812] border-r border-gray-800 flex flex-col absolute md:relative z-30 h-full transform -translate-x-full md:translate-x-0">
        <div class="p-4 border-b border-gray-800 flex justify-between items-center">
            <h2 class="text-xl font-bold text-pink-500"><i class="fas fa-robot"></i> INSS IA</h2>
            <button class="md:hidden text-white" onclick="toggleMenu(false)"><i class="fas fa-times"></i></button>
        </div>
        <div id="navContainer" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2"></div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col relative h-full bg-[#130c1a]">
        
        <!-- MOBILE HEADER -->
        <header class="md:hidden flex items-center justify-between p-4 bg-[#0d0812] border-b border-gray-800">
            <button onclick="toggleMenu(true)" class="text-white text-xl"><i class="fas fa-bars"></i></button>
            <h1 id="mobileTitle" class="font-bold">INSS Conecta</h1>
            <div id="mobileDot" class="w-3 h-3 rounded-full bg-green-500"></div>
        </header>

        <!-- SELECTION OVERLAY -->
        <div id="selectionOverlay" class="absolute inset-0 z-20 bg-[#130c1a] p-6 overflow-y-auto flex flex-col items-center justify-center">
            <h1 class="text-3xl md:text-4xl font-bold mb-8 text-center">Bienvenido a INSS Conecta</h1>
            <div id="welcomeGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl w-full"></div>
        </div>

        <!-- CHAT INTERFACE -->
        <div id="chatInterface" class="hidden flex-1 flex-col h-full">
            <header class="hidden md:flex p-6 border-b border-gray-800 justify-between items-center">
                <div>
                    <h2 id="activeTitle" class="text-2xl font-bold">Módulo</h2>
                    <p id="activeSubtitle" class="text-gray-400 text-sm">Subtítulo</p>
                </div>
                <div class="flex items-center gap-2">
                    <div id="statusDot" class="w-3 h-3 rounded-full bg-green-500"></div>
                    <span id="statusText" class="text-sm">En línea</span>
                </div>
            </header>

            <div id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col pb-24"></div>

            <div class="absolute bottom-0 w-full p-4 bg-[#130c1a]">
                <div class="max-w-4xl mx-auto flex items-end gap-2 bg-[#1f2937] p-2 rounded-2xl border border-gray-700">
                    <textarea id="userInput" rows="1" class="flex-1 bg-transparent border-none outline-none resize-none p-2 text-white placeholder-gray-400 max-h-32" placeholder="Escribe tu consulta..."></textarea>
                    <button id="sendBtn" onclick="onMainButtonClick()" class="btn-chicha w-12 h-12 rounded-full flex items-center justify-center shrink-0">
                        <i class="fas fa-microphone"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- URL DE LA WEB APP (APPS SCRIPT) ---
        const WEB_APP_URL =      "https://script.google.com/macros/s/AKfycbzQaHCRf09t87xqMhpJH7q02o9UKcsWLthEP0shGpAz-HNJ9KWogDT52i1pZRAQzkDu/exec"

        // Configuración de módulos
        const MODULES = [
            { id: "seguros", icon: "fas fa-shield-alt", name: "Seguros", desc: "Información detallada sobre tipos de seguros y coberturas.", subtitle: "Atención de Seguros", badge: "" },
            { id: "tramites", icon: "fas fa-file-signature", name: "Trámites", desc: "Gestión, requisitos y seguimiento de trámites institucionales.", subtitle: "Gestión Documental", badge: "MÁS SOLICITADO" },
            { id: "programas", icon: "fas fa-hand-holding-medical", name: "Programas", desc: "Afiliación, beneficios y programas integrales de salud.", subtitle: "Beneficios y Salud", badge: "" }
        ];

        let currentModule = null;

        // Iconos del Botón
        const sendIconHTML = `<i class="fas fa-paper-plane"></i>`;
        const micIconHTML = `<i class="fas fa-microphone"></i>`;
        const stopIconHTML = `<i class="fas fa-stop"></i>`;

        let recordingMode = 'none';
        let mediaRecorder = null;
        let audioChunks = [];
        let recognition = null;
        let transcribedText = "";

        // Inicialización al cargar la página
        document.addEventListener('DOMContentLoaded', () => {
            renderWelcomeGrid();
            renderSidebarNav();
            setupTextarea();
        });

        function renderWelcomeGrid() {
            const grid = document.getElementById('welcomeGrid');
            if(!grid) return; // Previene el error de null
            
            grid.innerHTML = MODULES.map(m => `
            <div class="welcome-card" onclick="selectModule('${m.id}')">
              <div class="card-badge" style="visibility: ${m.badge ? 'visible' : 'hidden'}">${m.badge || 'N/A'}</div>
              <div class="card-icon-big"><i class="${m.icon}"></i></div>
              <h3 class="font-bold text-xl mb-2">${m.name}</h3>
              <p class="text-sm text-gray-400 mb-4">${m.desc}</p>
              <button class="w-full py-2 rounded-lg btn-chicha text-sm font-bold">Ingresar</button>
            </div>
          `).join('');
        }

        function renderSidebarNav() {
            const container = document.getElementById('navContainer');
            if(!container) return; // Previene el error de null
            
            container.innerHTML = MODULES.map(m => `
            <button class="nav-btn ${currentModule === m.id ? 'active' : ''}" onclick="selectModule('${m.id}')">
              <div class="icon-box"><i class="${m.icon}"></i></div>
              <div class="nav-info">
                <b class="block text-sm">${m.name}</b>
                <span class="text-xs text-gray-400">${m.subtitle}</span>
              </div>
            </button>
          `).join('');
        }

        function selectModule(id) {
            currentModule = id;
            const m = MODULES.find(x => x.id === id);

            const selectionOverlay = document.getElementById('selectionOverlay');
            const chatInterface = document.getElementById('chatInterface');
            if(selectionOverlay) selectionOverlay.classList.add('hidden');
            if(chatInterface) chatInterface.classList.remove('hidden');
            if(chatInterface) chatInterface.classList.add('flex');

            const activeTitle = document.getElementById('activeTitle');
            const activeSubtitle = document.getElementById('activeSubtitle');
            const mobileTitle = document.getElementById('mobileTitle');
            
            if(activeTitle) activeTitle.textContent = m.name;
            if(activeSubtitle) activeSubtitle.textContent = m.subtitle;
            if(mobileTitle) mobileTitle.textContent = m.name;

            renderSidebarNav();

            const chat = document.getElementById('chatContainer');
            if(chat) {
                chat.innerHTML = '';
                addMessage('ai', `¡Hola! Has ingresado al módulo de **${m.name}**.\n\nEstoy aquí para asistirte con toda la información sobre ${m.desc.toLowerCase()}`);
            }

            if(window.innerWidth <= 950) toggleMenu(false);
        }

        function formatMessageText(text) {
            if (!text) return "";
            let formatted = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\n/g, "<br>");
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            return formatted;
        }

        function addMessage(type, text) {
            const chat = document.getElementById('chatContainer');
            if(!chat) return;
            
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            if (typeof text === 'string' && text.includes('<audio')) {
                div.innerHTML = text; 
            } else {
                div.innerHTML = formatMessageText(text);
            }
            
            chat.appendChild(div);
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
        }

        function setupTextarea() {
            const tx = document.getElementById('userInput');
            if(!tx) return;
            
            tx.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                updateSendButtonIcon();
            });
            tx.addEventListener('keydown', e => {
                if(e.key === 'Enter' && !e.shiftKey && window.innerWidth > 950) {
                    e.preventDefault();
                    if (tx.value.trim() !== '') handleSend();
                }
            });
        }

        function updateSendButtonIcon() {
            const tx = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            if(!tx || !btn) return;
            
            if (tx.value.trim() !== '') {
                btn.innerHTML = sendIconHTML;
            } else if (recordingMode === 'none') {
                btn.innerHTML = micIconHTML;
            }
        }

        function onMainButtonClick() {
            const tx = document.getElementById('userInput');
            if(!tx) return;
            
            const text = tx.value.trim();
            if (text !== '') {
                handleSend();
            } else {
                toggleRecording();
            }
        }

        function toggleMenu(force) {
            const sidebar = document.getElementById('sidebar');
            if(!sidebar) return;
            
            if (force !== undefined) {
                force ? sidebar.classList.add('open') : sidebar.classList.remove('open');
            } else {
                sidebar.classList.toggle('open');
            }
        }

        function setLoading(isLoading) {
            const dot = document.getElementById('statusDot');
            const mDot = document.getElementById('mobileDot');
            const txt = document.getElementById('statusText');
            const btn = document.getElementById('sendBtn');
            const tx = document.getElementById('userInput');

            if(isLoading) {
                if(dot) dot.classList.add('busy', 'bg-yellow-400');
                if(mDot) mDot.classList.add('busy', 'bg-yellow-400');
                if(txt) txt.textContent = "Escribiendo...";
                if(btn) btn.disabled = true;
                if(tx) tx.disabled = true;
            } else {
                if(dot) dot.classList.remove('busy', 'bg-yellow-400');
                if(mDot) mDot.classList.remove('busy', 'bg-yellow-400');
                if(txt) txt.textContent = "En línea";
                if(btn) btn.disabled = false;
                if(tx) {
                    tx.disabled = false;
                    setTimeout(() => tx.focus(), 100);
                }
            }
        }

        async function toggleRecording() {
            const btn = document.getElementById('sendBtn');
            const inputArea = document.getElementById('userInput');

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("⚠️ Tu navegador no soporta grabaciones de audio o el acceso está bloqueado en este entorno.");
                return;
            }

            if (recordingMode === 'none') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                    recordingMode = 'real';
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    transcribedText = "";

                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        recognition = new SpeechRecognition();
                        recognition.lang = 'es-NI';
                        recognition.continuous = true;
                        recognition.interimResults = true;

                        recognition.onresult = (event) => {
                            let interim = "";
                            let final = "";
                            for (let i = event.resultIndex; i < event.results.length; ++i) {
                                if (event.results[i].isFinal) final += event.results[i][0].transcript;
                                else interim += event.results[i][0].transcript;
                            }
                            transcribedText += final;
                            inputArea.placeholder = "Escuchando: " + transcribedText + interim;
                        };
                        recognition.start();
                    }

                    mediaRecorder.ondataavailable = e => {
                        if (e.data.size > 0) audioChunks.push(e.data);
                    };

                    mediaRecorder.onstop = () => {
                        if (recognition) recognition.stop();
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });

                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => {
                            const base64Audio = reader.result;
                            sendAudioMessage(base64Audio, transcribedText);
                        };

                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    setUIRecordingState(true);

                } catch (err) {
                    console.warn("Error:", err);
                    alert("⚠️ Error al acceder al micrófono: " + err.message);
                    recordingMode = 'none';
                    setUIRecordingState(false);
                }
            } else {
                if (recordingMode === 'real' && mediaRecorder) {
                    mediaRecorder.stop();
                }
                recordingMode = 'none';
                setUIRecordingState(false);
            }
        }

        function setUIRecordingState(isRec) {
            const btn = document.getElementById('sendBtn');
            const inputArea = document.getElementById('userInput');
            if (isRec) {
                if(btn) {
                    btn.innerHTML = stopIconHTML;
                    btn.classList.add('recording');
                    btn.classList.remove('btn-chicha');
                }
                if(inputArea) {
                    inputArea.placeholder = "Grabando... (Click para detener)";
                    inputArea.disabled = true;
                }
            } else {
                if(btn) {
                    btn.innerHTML = micIconHTML;
                    btn.classList.remove('recording');
                    btn.classList.add('btn-chicha');
                }
                if(inputArea) {
                    inputArea.placeholder = "Escribe tu consulta aquí...";
                    inputArea.disabled = false;
                    inputArea.focus();
                }
            }
        }

        async function handleSend() {
            const inputArea = document.getElementById('userInput');
            if(!inputArea) return;
            
            const text = inputArea.value.trim();
            
            if (!text || !currentModule) return;

            addMessage('user', text);
            
            inputArea.value = '';
            inputArea.style.height = 'auto';
            updateSendButtonIcon();
            setLoading(true);

            try {
                const payload = { tipo: "texto", modulo: currentModule, texto: text };

                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("Error en red " + response.status);

                const textResponse = await response.text();
                let data;
                try { data = JSON.parse(textResponse); } 
                catch(e) { throw new Error("El servidor no devolvió JSON válido."); }
                
                const respuestaIA = data.respuesta || "Mensaje recibido.";
                addMessage('ai', respuestaIA);

            } catch (error) {
                console.error('CORS o Red Error:', error);
                addMessage('error', '⚠️ Error de conexión. Revisa que el script esté configurado con acceso a "Cualquier Persona" (Anyone).');
            } finally {
                setLoading(false);
            }
        }

        async function sendAudioMessage(audioUrlOrBase64, text) {
            if (!currentModule) return;

            const finalTxt = text && text.trim() !== '' ? text.trim() : "Audio grabado.";
            const audioHtmlContent = `
                <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px; width: 100%;">
                    <audio controls src="${audioUrlOrBase64}" style="height: 40px; max-width: 220px; outline: none; border-radius: 20px;"></audio>
                    <div style="font-size: 12px; opacity: 0.95; text-align: right; background: rgba(0,0,0,0.15); padding: 8px 12px; border-radius: 12px; max-width: 100%;">
                        🎤 "${finalTxt}"
                    </div>
                </div>
            `;
            addMessage('user audio-msg', audioHtmlContent);
            setLoading(true);

            try {
                const payload = { tipo: "audio", modulo: currentModule, textoAudio: finalTxt, audioBase64: audioUrlOrBase64 };

                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("Error en red " + response.status);

                const textResponse = await response.text();
                let data;
                try { data = JSON.parse(textResponse); } 
                catch(e) { throw new Error("Respuesta no válida."); }
                
                const respuestaIA = data.respuesta || "Audio procesado.";
                addMessage('ai', respuestaIA);

            } catch (error) {
                console.error('CORS o Red Error (Audio):', error);
                addMessage('error', '⚠️ Error de conexión al enviar el audio.');
            } finally {
                setLoading(false);
            }
        }
    </script>
</body>
</html>
